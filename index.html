<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تسجيل الدخول - Super Market</title>
    <link rel="stylesheet" href="css/all.min.css" />
    <link rel="icon" href="" />
    <link rel="stylesheet" href="css/login_style.css" />
    <link rel="stylesheet" href="css/login_layout.css" />
  </head>
  <body>
    <div id="login">
      <div class="container">
        <div class="inner">
          <div class="item">
            <div class="content">
              <div class="head">
                <div class="img">
                  <i class="fa-solid fa-cart-shopping"></i>
                </div>
                <div class="titel">
                  <h2>سوبر ماركت الشرقاوي</h2>
                  <p>تسجيل الدخول للنظام</p>
                </div>
              </div>
              <div class="login">
                <div class="form">
                  <form method="post">
                    <table>
                      <tbody>
                        <tr>
                          <td>
                            <label for="username">اسم المستخدم</label>
                          </td>
                        </tr>
                        <tr>
                          <td class="input">
                            <i class="fa-solid fa-user"></i>
                            <input
                              type="search"
                              id="username"
                              placeholder="ادخل اسم المستخدم"
                            />
                          </td>
                        </tr>
                        <tr>
                          <td>
                            <label for="password">كلمة المرور</label>
                          </td>
                        </tr>
                        <tr>
                          <td class="input">
                            <i class="fa-solid fa-lock"></i>
                            <input
                              type="password"
                              id="password"
                              placeholder="ادخل كلمة المرور"
                            />
                          </td>
                        </tr>
                        <tr>
                          <td>
                            <div class="check">
                              <label for="remindme">ذكرني</label>
                              <input
                                type="checkbox"
                                name="remindme"
                                id="remindme"
                              />
                            </div>
                          </td>
                        </tr>
                        <tr>
                          <!-- js من زرار تسجيل الدخول عند استخدام a يتم حذف  -->
                          <td>
                            <div class="button">
                              <button type="submit"><a href="html/home_page.html" target="_parent">تسجيل الدخول</a></button>
                            </div>
                          </td>
                        </tr>
                      </tbody>
                      <tfoot>
                        <tr>
                          <td>
                            <div class="footer-text">
                              <p>Super Market System © 2026</p>
                            </div>
                          </td>
                        </tr>
                      </tfoot>
                    </table>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
