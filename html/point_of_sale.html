          <div class="content">
            <div class="header">
              <div class="titel">
                <i class="fa-solid fa-cash-register"></i>
                <h2>نقطة المبيعات</h2>
              </div>
              <!-- <div class="used-name">
                <i class="fa-solid fa-user"></i>
                <span> مدير النظام</span>
              </div> -->
            </div>
            <div class="pos">
              <div class="left-side xl-50">
                <div class="top-header">
                  <h2>نقطة البيع POS</h2>
                  <div class="search-box">
                    <input type="search" placeholder="بحث عن منتج" />
                  </div>
                </div>
                <div class="product-form">
                  <div class="input-box">
                    <label for="barcod">الباركود</label>
                    <input
                      type="number"
                      id="barcod"
                      placeholder="امسح الباركود"
                    />
                  </div>
                  <div class="input-box">
                    <label for="product-name">اسم المنتج</label>
                    <input
                      type="search"
                      id="product-name"
                      placeholder="اسم المنتج"
                      disabled
                    />
                  </div>
                  <div class="input-box">
                    <label for="quantity">الكميه</label>
                    <input
                      type="number"
                      id="quantity"
                      placeholder="0"
                      min="1"
                      max="100"
                    />
                  </div>
                  <div class="input-box">
                    <label for="price">السعر</label>
                    <input
                      type="number"
                      id="price"
                      placeholder="0.00"
                      disabled
                    />
                  </div>
                  <div class="input-box">
                    <label for="discount">الخصم</label>
                    <input type="number" id="discount" placeholder="%" />
                  </div>
                  <div class="input-box">
                    <label for="inventory">المخزون</label>
                    <input
                      type="number"
                      placeholder="الكميه المتاحه"
                      disabled
                    />
                  </div>
                  <button type="button" class="add-button">
                    <i class="fa-solid fa-cart-plus"></i>
                    <h3>إضافة المنتج للفاتورة</h3>
                  </button>
                </div>
                <div class="product-table">
                  <table>
                    <thead>
                      <tr class="head">
                        <th>المنتج</th>
                        <th>الكمية</th>
                        <th>السعر</th>
                        <th>الإجمالي</th>
                        <th>حذف</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td>أرز بسمتي</td>
                        <td>2</td>
                        <td>120 ج</td>
                        <td>240 ج</td>
                        <td>
                          <div class="delete-button">
                            <i class="fa-solid fa-trash"></i>
                          </div>
                        </td>
                      </tr>
                      <tr>
                        <td>زيت عباد الشمس</td>
                        <td>1</td>
                        <td>85 ج</td>
                        <td>85 ج</td>
                        <td>
                          <div class="delete-button">
                            <i class="fa-solid fa-trash"></i>
                          </div>
                        </td>
                      </tr>
                    </tbody>
                  </table>
                </div>
              </div>
              <div class="right-side xl-40">
                <div class="bill-header">
                  <h3>الفاتورة</h3>
                  <i class="fa-solid fa-receipt fa-2x"></i>
                </div>
                <div class="customer-box">
                  <input type="search" placeholder="اسم العميل" />
                </div>
                <div class="bill-details">
                  <table>
                    <thead>
                      <tr>
                        <th>اسم الصنف</th>
                        <th>الكميه</th>
                        <th>السعر</th>
                        <th>الإجمالي</th>
                      </tr>
                    </thead>
                    <tbody>
                      <tr>
                        <td>أرز بسمتي</td>
                        <td>2</td>
                        <td>120 ج</td>
                        <td>240 ج</td>
                      </tr>
                      <tr>
                        <td>زيت عباد الشمس</td>
                        <td>1</td>
                        <td>85 ج</td>
                        <td>85 ج</td>
                      </tr>
                    </tbody>
                  </table>
                </div>
                <div class="totals">
                  <div class="total-line">
                    <span>الإجمالي</span>
                    <span>325 ج</span>
                  </div>
                  <div class="total-line">
                    <span>الخصم</span>
                    <span>25 ج</span>
                  </div>
                  <div class="total-line final-total">
                    <span>المبلغ النهائي</span>
                    <span>300 ج</span>
                  </div>
                </div>
                <div class="payment-method">
                  <h3>طرق الدفع</h3>
                  <div class="payment-cards">
                    <div class="payment-card">
                      <i class="fa-solid fa-money-bill"></i>
                      <span>كاش</span>
                    </div>
                    <div class="payment-card">
                      <i class="fa-brands fa-cc-visa"></i>
                      <span>فيزا</span>
                    </div>
                    <div class="payment-card">
                      <i class="fa-solid fa-mobile-screen"></i>
                      <span>محفظة</span>
                    </div>
                    <div class="payment-card">
                      <i class="fa-solid fa-building-columns"></i>
                      <span>تحويل</span>
                    </div>
                  </div>
                </div>
                <div class="action-buttons">
                  <button class="print-button">
                    <i class="fa-solid fa-print"></i>
                    <span>طباعة الفاتورة</span>
                  </button>
                  <button class="pay-button">
                    <i class="fa-solid fa-credit-card"></i>
                    <span>إتمام الدفع</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
